# Veris simulation configuration
version: "1.0"

dlp-health-agent:
  services:
    - name: llm-proxy
      dns_aliases:
        - api.anthropic.com
        - api.openai.com
        - api.baseten.co

  actor:
    channels:
      - type: http
        url: http://localhost:8008/chat
        method: POST
        headers:
          Content-Type: application/json
        request:
          message_field: message
          session_field: session_id
        response:
          type: json
          message_field: response
          session_field: session_id

  agent:
    name: MediGuard AI
    code_path: /agent
    entry_point: uvicorn api.server:app --host 0.0.0.0 --port 8008
    port: 8008
