name: Veris Simulation

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test type"
        type: choice
        options:
          - smoke (1 credit)
          - full (25 credits)
        default: "smoke (1 credit)"
      dry_run:
        description: "Dry run (validate only, no simulation)"
        type: boolean
        default: false
      image_tag:
        description: "Image tag (default: latest)"
        required: false
        default: "latest"
  push:
    branches: [main]
    paths:
      - ".veris/**"

env:
  VERIS_ENV_ID: ${{ vars.VERIS_ENV_ID }}
  VERIS_SCENARIO_SET_SMOKE: ${{ vars.VERIS_SCENARIO_SET_SMOKE }}
  VERIS_SCENARIO_SET_FULL: ${{ vars.VERIS_SCENARIO_SET_FULL }}

jobs:
  # Auto-rebuild image on Dockerfile changes (no simulation)
  rebuild-image:
    name: Rebuild Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Veris CLI
        run: pip install "veris-cli>=2.22.2"

      - name: Push image
        env:
          VERIS_API_KEY: ${{ secrets.VERIS_API_KEY }}
        run: |
          veris login "$VERIS_API_KEY"
          veris env push --env-id ${{ vars.VERIS_ENV_ID }} --tag ${{ github.sha }}
          echo "✅ Image rebuilt (no simulation)"

  # Manual simulation only
  run-simulation:
    name: Run Simulation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 40
    steps:
      - name: Select scenario set
        id: config
        run: |
          if [[ "${{ inputs.test_type }}" == "smoke (1 credit)" ]]; then
            echo "scenario_set=${{ vars.VERIS_SCENARIO_SET_SMOKE }}" >> $GITHUB_OUTPUT
            echo "Using SMOKE scenario set (1 credit)"
          else
            echo "scenario_set=${{ vars.VERIS_SCENARIO_SET_FULL }}" >> $GITHUB_OUTPUT
            echo "Using FULL scenario set (25 credits)"
          fi

      - name: Dry run
        if: inputs.dry_run
        run: |
          echo "🔍 DRY RUN"
          echo ""
          echo "Environment:  ${{ vars.VERIS_ENV_ID }}"
          echo "Scenario Set: ${{ steps.config.outputs.scenario_set }}"
          echo "Image Tag:    ${{ inputs.image_tag }}"
          echo "Test Type:    ${{ inputs.test_type }}"
          echo ""
          echo "✅ Config valid — no simulation triggered"

      - name: Install requests
        if: ${{ !inputs.dry_run }}
        run: pip install requests

      - name: Trigger simulation
        if: ${{ !inputs.dry_run }}
        id: trigger
        env:
          VERIS_API_KEY: ${{ secrets.VERIS_API_KEY }}
          SCENARIO_SET: ${{ steps.config.outputs.scenario_set }}
        run: |
          python3 - <<'EOF'
          import os, requests, sys

          base    = "https://sandbox.api.veris.ai/v1"
          headers = {"Authorization": f"Bearer {os.environ['VERIS_API_KEY']}", "Content-Type": "application/json"}

          payload = {
              "environment_id":  os.environ["VERIS_ENV_ID"],
              "scenario_set_id": os.environ["SCENARIO_SET"],
              "image_tag":       "${{ inputs.image_tag }}",
          }

          print(f"Triggering: {payload}")
          resp = requests.post(f"{base}/runs", headers=headers, json=payload, timeout=30)
          if not resp.ok:
              print(f"POST /runs failed: {resp.status_code}")
              print(resp.text[:2000])
              sys.exit(1)

          body = resp.json()
          run_id = body.get("run_id") or body.get("id")
          if not run_id:
              print(f"No run id: {body}")
              sys.exit(1)

          print(f"✅ Run created: {run_id}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"run_id={run_id}\n")
          EOF

      - name: Poll until complete
        if: ${{ !inputs.dry_run }}
        env:
          VERIS_API_KEY: ${{ secrets.VERIS_API_KEY }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
        run: |
          python3 - <<'EOF'
          import os, requests, sys, time

          base     = "https://sandbox.api.veris.ai/v1"
          headers  = {"Authorization": f"Bearer {os.environ['VERIS_API_KEY']}"}
          run_id   = os.environ["RUN_ID"]
          timeout  = 1800
          interval = 30
          deadline = time.time() + timeout

          status = "unknown"
          while time.time() < deadline:
              try:
                  r = requests.get(f"{base}/runs/{run_id}", headers=headers, timeout=30)
                  r.raise_for_status()
                  status = r.json().get("status", "")
              except requests.RequestException as e:
                  print(f"  poll error, retrying...", flush=True)
                  time.sleep(interval)
                  continue

              print(f"  status: {status}", flush=True)
              if status in ("completed", "failed", "cancelled"):
                  break
              time.sleep(interval)
          else:
              print(f"Timed out (last status: {status})")
              sys.exit(1)

          # Summary
          sims_resp = requests.get(f"{base}/runs/{run_id}/simulations", headers=headers, timeout=30)
          sim_list = sims_resp.json().get("items", []) if sims_resp.ok else []

          sf = os.getenv("GITHUB_STEP_SUMMARY")
          if sf:
              lines = [
                  "## Veris Results",
                  f"| Run ID | `{run_id}` |",
                  f"| Status | **{status}** |",
                  f"| Simulations | {len(sim_list)} |",
              ]
              open(sf, "a").write("\n".join(lines) + "\n")

          if status != "completed":
              sys.exit(1)
          EOF
