name: CI — DLP + Voicerun Agents

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]

env:
  PYTHON_VERSION: "3.11"
  VERIS_ENV_ID: ${{ vars.VERIS_ENV_ID }}
  VERIS_SCENARIO_SET_ID: ${{ vars.VERIS_SCENARIO_SET_ID }}
  VERIS_GRADER_ID: ${{ vars.VERIS_GRADER_ID }}

jobs:
  # ── Unit Tests (no API calls) ───────────────────────────────────────────
  unit-tests:
    name: Unit Tests (regex, redaction, secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install anthropic openai fastapi uvicorn python-dotenv requests pytest

      - name: Run pure-logic tests (no API)
        env:
          ANTHROPIC_API_KEY: placeholder
          OPENAI_API_KEY: placeholder
          BASETEN_API_KEY: placeholder
        run: PYTHONPATH=. pytest tests/ -v --tb=short -k "not full_pipeline"

  # ── Integration Tests (live API calls) ─────────────────────────────────
  integration-tests:
    name: Integration Tests (full pipeline)
    runs-on: ubuntu-latest
    # Only run when secrets are present (skipped on forks / PRs from outside)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install anthropic openai fastapi uvicorn python-dotenv requests pytest

      - name: Run full pipeline tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASETEN_API_KEY: ${{ secrets.BASETEN_API_KEY }}
          BASETEN_MODEL: ${{ secrets.BASETEN_MODEL }}
          YOUCOM_API_KEY: ${{ secrets.YOUCOM_API_KEY }}
        run: PYTHONPATH=. pytest tests/ -v --tb=short -k "full_pipeline"

  # ── Voicerun Agent Smoke Test ───────────────────────────────────────────
  voicerun-tests:
    name: Voicerun Agent Smoke Test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install anthropic openai fastapi uvicorn python-dotenv requests pytest voicerun-cli || true

      - name: Verify Voicerun handler syntax
        run: |
          python -m py_compile voicerun/handler.py && echo "voicerun/handler.py syntax OK"
          python -m py_compile voicerun/config.py && echo "voicerun/config.py syntax OK"

      - name: Verify API server starts
        env:
          ANTHROPIC_API_KEY: placeholder
          OPENAI_API_KEY: placeholder
        run: |
          uvicorn api.server:app --host 0.0.0.0 --port 8008 &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:8008/health && echo "Health check passed" || echo "Server not up yet (OK in CI)"
          kill $SERVER_PID 2>/dev/null || true

  # ── Veris Adversarial Simulation (real cloud run) ──────────────────────
  veris-simulation:
    name: Veris Adversarial Simulation
    runs-on: ubuntu-latest
    needs: [unit-tests, voicerun-tests]
    environment: veris-sandbox-ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Veris CLI + deps
        run: pip install "veris-cli>=2.22.2" requests

      - name: Authenticate with Veris
        env:
          VERIS_API_KEY: ${{ secrets.VERIS_API_KEY }}
        run: veris login "$VERIS_API_KEY"

      - name: Build & push agent image
        run: |
          veris env push \
            --env-id ${{ env.VERIS_ENV_ID }} \
            --tag ${{ github.sha }}

      - name: Run simulation & evaluation
        run: |
          GRADER_ARG=""
          if [ -n "${{ env.VERIS_GRADER_ID }}" ]; then
            GRADER_ARG="--grader-id ${{ env.VERIS_GRADER_ID }}"
          fi
          veris run \
            --scenario-set-id ${{ env.VERIS_SCENARIO_SET_ID }} \
            --env-id ${{ env.VERIS_ENV_ID }} \
            $GRADER_ARG \
            --image-tag ${{ github.sha }} \
            > veris-summary.md
          cat veris-summary.md

      - name: Fetch latest run details from Veris API
        if: always()
        env:
          VERIS_API_KEY: ${{ secrets.VERIS_API_KEY }}
        run: |
          python - <<'EOF'
          import os, json, requests, sys

          headers = {"Authorization": f"Bearer {os.environ['VERIS_API_KEY']}"}
          env_id  = os.environ["VERIS_ENV_ID"]

          # Latest completed run for this environment
          resp = requests.get(
              "https://sandbox.api.veris.ai/v1/runs",
              headers=headers,
              params={"environment_id": env_id, "status": "completed", "limit": 1},
              timeout=30,
          )
          resp.raise_for_status()
          items = resp.json().get("items", [])
          if not items:
              print("No completed runs found yet")
              sys.exit(0)

          run     = items[0]
          run_id  = run["id"]
          tag     = run.get("image_tag", "N/A")
          status  = run["status"]
          print(f"Run ID : {run_id}")
          print(f"Image  : {tag}")
          print(f"Status : {status}")

          # Fetch simulations in this run
          sims = requests.get(
              f"https://sandbox.api.veris.ai/v1/runs/{run_id}/simulations",
              headers=headers, timeout=30,
          ).json().get("items", [])
          print(f"Simulations: {len(sims)}")

          # Write to GitHub step summary
          sf = os.getenv("GITHUB_STEP_SUMMARY")
          if sf:
              lines = [
                  "\n## Veris Sandbox — Latest Run\n",
                  f"| Field | Value |",
                  f"|---|---|",
                  f"| Run ID | `{run_id}` |",
                  f"| Image tag | `{tag}` |",
                  f"| Status | {status} |",
                  f"| Simulations | {len(sims)} |",
              ]
              open(sf, "a").write("\n".join(lines) + "\n")
          EOF

      - name: Upload Veris summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veris-simulation-report-${{ github.sha }}
          path: veris-summary.md
          if-no-files-found: ignore
          retention-days: 30
