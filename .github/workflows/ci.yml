name: CI — Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pure-logic tests (no API)
        env:
          ANTHROPIC_API_KEY: placeholder
          OPENAI_API_KEY: placeholder
          BASETEN_API_KEY: placeholder
        run: PYTHONPATH=. pytest tests/ -v --tb=short -k "not full_pipeline"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run full pipeline tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASETEN_API_KEY: ${{ secrets.BASETEN_API_KEY }}
          BASETEN_MODEL: ${{ secrets.BASETEN_MODEL }}
          YOUCOM_API_KEY: ${{ secrets.YOUCOM_API_KEY }}
        run: PYTHONPATH=. pytest tests/ -v --tb=short -k "full_pipeline"

  voicerun-smoke:
    name: Voicerun Smoke Test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt voicerun-cli || true

      - name: Verify syntax
        run: |
          python -m py_compile voicerun/handler.py
          python -m py_compile voicerun/config.py

      - name: Verify API server starts
        env:
          ANTHROPIC_API_KEY: placeholder
          OPENAI_API_KEY: placeholder
        run: |
          uvicorn api.server:app --host 0.0.0.0 --port 8008 &
          sleep 3
          curl -sf http://localhost:8008/health || echo "Server check skipped"
          pkill -f uvicorn || true
