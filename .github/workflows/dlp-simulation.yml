name: DLP Veris Simulation

on:
  workflow_dispatch:

jobs:
  veris-simulation:
    runs-on: ubuntu-latest
    name: Veris Adversarial Detection Test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install python-dotenv

      - name: Run Veris simulation
        run: python tests/veris_simulation.py --github
        env:
          PYTHONPATH: ${{ github.workspace }}
          ANTHROPIC_API_KEY: placeholder
          OPENAI_API_KEY: placeholder
          BASETEN_API_KEY: placeholder

      - name: Upload simulation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veris-simulation-report
          path: "*.jsonl"
          if-no-files-found: ignore
